# ============================================================================
# Cowrie SSH/Telnet Honeypot Configuration
# ============================================================================

[honeypot]
hostname = honeypot
log_path = /var/log/cowrie
data_path = /var/lib/cowrie

[output_plugin:textlog]
enabled = true

[output_plugin:jsonlog]
enabled = true

[output_plugin:syslog]
enabled = true
address = 192.168.50.20:514
facility = 16

[ssh]
port = 22
listen_addr =
banner_file = /etc/cowrie/banner.txt

[telnet]
port = 23
enabled = false

[database]
log_db = file:///var/lib/cowrie/cowrie.db

[client_parser:ssh]
enabled = true

[honeypot:telnet]
enabled = false
port = 23
timeout = 300

[shell]
⁣shell_type = linux
path = /usr/bin/bash

[frontend]
enabled = false

[proxy]
enabled = false

[misc]
download_path = /var/lib/cowrie/downloads
