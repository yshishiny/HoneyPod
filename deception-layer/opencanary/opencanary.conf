{
    "device.node_id": "opencanary-deception-01",
    "git.enabled": false,
    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "Welcome to corp-backup-01 FTP Server v1.0",
    "http.enabled": true,
    "http.port": 80,
    "http.banner": "Microsoft-IIS/10.0",
    "httpproxy.enabled": false,
    "httpproxy.port": 8080,
    "https.enabled": true,
    "https.port": 443,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                },
                "syslog-remote": {
                    "class": "logging.handlers.SysLogHandler",
                    "host": "siem-ls-01.lab.honeypod.local",
                    "port": 514,
                    "socktype": "SOCK_DGRAM",
                    "formatter": "plain"
                }
            }
        }
    },
    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "5.7.20",
    "ntp.enabled": false,
    "ntp.port": 123,
    "redis.enabled": false,
    "redis.port": 6379,
    "rdp.enabled": true,
    "rdp.port": 3389,
    "sip.enabled": false,
    "sip.port": 5060,
    "smb.enabled": true,
    "smb.auditfile": "/var/log/opencanary/smb.log",
    "snmp.enabled": false,
    "snmp.port": 161,
    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_7.4",
    "telnet.enabled": true,
    "telnet.port": 23,
    "telnet.banner": "Welcome to system [corp-backup-01]",
    "tftp.enabled": false,
    "tftp.port": 69,
    "vnc.enabled": true,
    "vnc.port": 5900
}
