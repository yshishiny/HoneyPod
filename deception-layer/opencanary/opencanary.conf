# OpenCanary Configuration
# Deploy to: DECEPTION-CANARY-01, DECEPTION-CANARY-02
# Edit and copy to canary nodes

[GLOBALCONFIG]
# Network binding
listen_addr = 0.0.0.0

# Syslog output (one-way to SIEM)
syslog_server = siem-ls-01.lab.honeypod.local
syslog_port = 514
syslog_facility = 19
syslog_remote_logging = true
syslog_log_format = CEF

# Alert channels
alert_channels = syslog, email

# Email alerts (optional)
alert_email_enabled = false
alert_email_to = security-team@corp.local
alert_email_from = canary-alerts@lab.honeypod.local
alert_email_smtp = siem-ls-01.lab.honeypod.local

# Logging/retention
preserve_module_history = true
preserve_startup_banner = true

---

[FTP]
enabled = true
port = 21
banner = "Welcome to corp-backup-01 FTP Server v1.0"

# Fake credentials that trigger alerts
fake_user = backup_admin
fake_pass = BackupPass2024!

---

[SSH]
enabled = true
port = 22
version = "OpenSSH_7.4"

# Users that look legitimate but will alert on login
fake_user = admin
fake_pass = P@ssw0rd2024!

# Also accept:
fake_user = root
fake_pass = root

---

[HTTP]
enabled = true
port = 80
banner = "Microsoft-IIS/10.0"

# Decoy admin panel
decoy_uri_list = ["/admin", "/admin.html", "/control", "/panel", "/login.aspx"]

---

[HTTPS]
enabled = true
port = 443
banner = "Microsoft-IIS/10.0"
cert = /etc/opencanary/honeypot.crt
key = /etc/opencanary/honeypot.key

decoy_uri_list = ["/admin", "/admin.html", "/vpn", "/login.aspx"]

---

[SMB]
enabled = true
port = 445

# Fake file shares with canary content
shares = [
  {
    "name": "backups",
    "path": "/mnt/canary/backups",
    "fake_files": ["database_2024.sql", "config_backup.zip"]
  },
  {
    "name": "admin",
    "path": "/mnt/canary/admin",
    "fake_files": ["credentials.txt", "deploy_keys.zip", "vpn_config.ovpn"]
  }
]

---

[TELNET]
enabled = true
port = 23
banner = "Welcome to system [corp-backup-01] (system)"

fake_user = admin
fake_pass = admin

---

[MYSQL]
enabled = true
port = 3306
version = "5.7.20"

# Fake database
databases = ["production", "analytics", "wordpress"]

---

[POSTGRES]
enabled = true
port = 5432
version = "9.6.10"

---

[VNC]
enabled = true
port = 5900

---

[RDP]
enabled = true
port = 3389

---

[NOOP]
enabled = true
port = 9999

---

[REDIS]
enabled = false
port = 6379

---

[MEMCACHE]
enabled = false
port = 11211

---

[SNIFFER]
enabled = true
pcap_file = /var/log/canary/canary.pcap
snaplen = 65535

---

# Alert rules
[ALERT_RULES]

# Trigger alerts on:
# - Any login attempt
# - Any port scan
# - Any file access
# - Any command execution
# - Any credential use
log_all_access = true
log_with_full_details = true
correlation_enabled = true
# Map suspected technique to MITRE ATT&CK when possible
enable_attack_mapping = true
