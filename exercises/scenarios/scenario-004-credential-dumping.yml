---
# ============================================================================
# HoneyPod Exercise Scenario 004: Credential Theft & Dumping
# Simulates T1003 (Credential Dumping), T1555 (Credentials from Password Stores)
# ============================================================================

name: "Scenario 004: Credential Theft & Credential Dumping"
version: "1.0"
date_created: "2026-03-18"
difficulty: "Hard"
duration_minutes: 50
lab_version_required: "1.0"

# ============================================================================
# EXERCISE OBJECTIVES
# ============================================================================

objectives:
  - "Dump SAM database from Windows endpoint"
  - "Extract LSASS process memory"
  - "Harvest credentials from browser password manager"
  - "Perform pass-the-hash authentication"
  - "Detect credential dumping techniques"

# ============================================================================
# MITRE ATT&CK COVERAGE
# ============================================================================

mitre_att_ck:
  - technique: "T1003.001"
    name: "Credential Dumping - LSASS Memory"
    severity: "critical"
  - technique: "T1003.002"
    name: "Credential Dumping - SAM"
    severity: "critical"
  - technique: "T1555.003"
    name: "Credentials from Password Stores - Browser Credentials"
    severity: "high"
  - technique: "T1550.002"
    name: "Use Alternate Auth - Pass the Hash"
    severity: "high"

d3fend_countermeasures:
  - "CM-0009: LSASS Protection (LSA Isolation)"
  - "CM-0010: LSASS Monitoring"
  - "CM-0011: Credential Guard"
  - "CM-0012: Privileged Access Management"

# ============================================================================
# RED TEAM PROCEDURES
# ============================================================================

red_team:
  attack_platform: "Caldera"
  target_group: "windows_endpoints"
  
  procedures:
    1:
      name: "Dump LSASS"
      technique: "T1003.001"
      steps:
        - "Gain SYSTEM privileges on ep-01"
        - "Use procdump to dump LSASS memory"
        - "Transfer dump file to attacker machine"
      expected_outcome: "LSASS memory dump obtained"
      
    2:
      name: "Extract SAM database"
      technique: "T1003.002"
      steps:
        - "Copy SAM file from registry"
        - "Copy SYSTEM file"
        - "Extract hashes offline"
      expected_outcome: "Hash extraction successful"
      
    3:
      name: "Browser credential theft"
      technique: "T1555.003"
      steps:
        - "Locate browser database files"
        - "Decrypt credentials using DPAPI key"
        - "Enumerate saved passwords"
      expected_outcome: "Plaintext credentials obtained"
      
    4:
      name: "Pass-the-hash lateral movement"
      technique: "T1550.002"
      steps:
        - "Use extracted NTLM hash for authentication"
        - "Authenticate to remote system without password"
        - "Access shared resources with stolen credentials"
      expected_outcome: "Lateral movement via stolen hash"

# ============================================================================
# BLUE TEAM DETECTION REQUIREMENTS
# ============================================================================

blue_team:
  success_criteria:
    - name: "LSASS Access Detection"
      description: "Detect procdump or memory dump of LSASS"
      target: "≥80% detection"
      points: 25
      
    - name: "Suspicious Process Execution"
      description: "Detect credential dumping tools"
      target: "procdump, mimikatz, sekurlsa"
      points: 20
      
    - name: "SAM Access Detection"
      description: "Detect unauthorized SAM registry access"
      target: "Registry modification/access alerts"
      points: 15
      
    - name: "Pass-the-Hash Detection"
      description: "Detect unusual NTLM authentication patterns"
      target: "Hash reuse detection"
      points: 15

  detection_opportunities:
    - "Sysmon Event ID 10: Process Access on LSASS"
    - "Sysmon Event ID 7: DLL load from credential dumping tools"
    - "Sysmon Event ID 3: Network traffic from file transfer"
    - "Windows Event Log: Registry access on SAM hive"
    - "Process Auditing: procdump.exe, mimikatz.exe execution"

# ============================================================================
# EXERCISE FLOW
# ============================================================================

flow:
  phase_1:
    name: "LSASS Extraction"
    duration: "15 minutes"
    actions:
      - red_team_executes_procedures_1
      - blue_team_detects_lsass_access
      
  phase_2:
    name: "Offline Hash Cracking"
    duration: "15 minutes"
    actions:
      - red_team_executes_procedures_2_3
      - blue_team_detects_tool_execution
      
  phase_3:
    name: "Lateral Movement with Stolen Creds"
    duration: "15 minutes"
    actions:
      - red_team_executes_procedure_4
      - blue_team_detects_pass_the_hash

# ============================================================================
# SCORING
# ============================================================================

scoring:
  red_team:
    lsass_dump_success: 15
    sam_extraction_success: 15
    credential_theft: 15
    pth_lateral_movement: 15
    total_possible: 60
    
  blue_team:
    lsass_detection: 25
    tool_detection: 20
    sam_detection: 15
    pth_detection: 15
    incident_response: 5
    total_possible: 80
