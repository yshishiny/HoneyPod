# ============================================================================
# Logstash Main Configuration
# Receives syslog from all lab systems and forwards to Elasticsearch
# ============================================================================

input {
  # Receive syslog from all lab systems
  udp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive syslog over TCP (more reliable)
  tcp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive Windows events (Winlogbeat)
  beats {
    port => 5000
    type => "beats"
  }
}

filter {
  # Parse syslog format
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:process}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}" }
      add_field => { "received_at" => "%{@timestamp}" }
      add_field => { "received_from" => "%{host}" }
    }

    # Parse SSH events
    if [process] =~ /sshd/ {
      mutate {
        add_tag => ["ssh"]
        add_field => { "event_type" => "authentication" }
      }
    }

    # Parse failed login attempts
    if [log_message] =~ /Failed password/ or [log_message] =~ /Invalid user/ {
      mutate {
        add_tag => ["failed_login"]
        add_field => { "event_status" => "failed" }
      }
    }

    # Parse successful logins
    if [log_message] =~ /Accepted/ {
      mutate {
        add_tag => ["successful_login"]
        add_field => { "event_status" => "success" }
      }
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # Honeypot alerts
  if [process] =~ /canary|cowrie/ or [hostname] =~ /canary|cowrie/ {
    mutate {
      add_tag => ["honeypot"]
      add_tag => ["high_priority"]
      add_field => { "severity" => "critical" }
      add_field => { "event_type" => "deception_engagement" }
    }
  }

  # OpenCanary JSON events
  if [source] == "opencanary" {
    json {
      source => "message"
    }
    mutate {
      add_field => { "event.category" => "honeypot" }
      add_field => { "alert.severity" => "high" }
      add_field => { "alert.reason" => "honeypot_engagement_detected" }
    }
  }

  # Add Lab metadata
  mutate {
    add_field => { "lab_name" => "HoneyPod" }
    add_field => { "lab_version" => "1.0" }
    add_field => { "environment" => "cyber_range" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    index => "siem-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USERNAME:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:honeypod-elastic-password-2024}"
    ssl_certificate_verification => false
  }

  # Console output for debugging
  stdout {
    codec => rubydebug
  }
}
