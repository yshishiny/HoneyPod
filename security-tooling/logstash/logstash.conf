# ============================================================================
# Logstash Main Configuration
# Receives syslog from all lab systems and forwards to Elasticsearch
# ============================================================================

input {
  # Receive syslog from all lab systems
  udp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive syslog over TCP (more reliable)
  tcp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive Windows events (Winlogbeat)
  beats {
    port => 5000
    type => "beats"
  }
}

filter {
  # Parse syslog format
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:process}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message}" }
      add_field => { "received_at" => "%{@timestamp}" }
      add_field => { "received_from" => "%{host}" }
    }

    # Parse SSH events
    if [process] =~ /sshd/ {
      grok {
        match => { "message" => "(?:Invalid user|Failed password|Accepted) %{DATA:auth_result}" }
      }
      mutate {
        add_tag => ["ssh"]
        add_field => { "event_type" => "authentication" }
      }
    }

    # Parse sudo events
    if [process] =~ /sudo/ or [message] =~ /sudo/ {
      grok {
        match => { "message" => "sudo: %{DATA:user} : TTY=%{DATA:tty} ; PWD=%{DATA:pwd} ; USER=%{DATA:target_user} ; COMMAND=%{DATA:command}" }
      }
      mutate {
        add_tag => ["privilege_escalation"]
        add_field => { "event_type" => "privilege_escalation" }
      }
    }

    # Parse failed login attempts
    if [message] =~ /Failed password/ or [message] =~ /Invalid user/ {
      mutate {
        add_tag => ["failed_login"]
        add_field => { "event_status" => "failed" }
      }
    }

    # Parse successful logins
    if [message] =~ /Accepted/ {
      mutate {
        add_tag => ["successful_login"]
        add_field => { "event_status" => "success" }
      }
    }

    # Add geographic data if IP is present
    if [host] {
      geoip {
        source => "host"
        target => "geoip"
      }
    }

    # Clean up
    mutate {
      remove_field => [ "message" ]
      remove_field => [ "host" ]
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
      timezone => "UTC"
    }
  }

  # Parse Beats events (Windows)
  if [type] == "beats" or [type] == "winlogbeat" {
    mutate {
      add_field => { "log_source" => "windows" }
      add_field => { "collected_at" => "%{@timestamp}" }
    }
  }

  # Honeypot alerts
  if [process] =~ /canary|cowrie/ or [hostname] =~ /canary|cowrie/ {
    mutate {
      add_tag => ["honeypot"]
      add_tag => ["high_priority"]
      add_field => { "severity" => "critical" }
      add_field => { "event_type" => "deception_engagement" }
    }
  }

  # Add Lab metadata
  mutate {
    add_field => { "lab_name" => "HoneyPod" }
    add_field => { "lab_version" => "1.0" }
    add_field => { "environment" => "cyber_range" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    index => "siem-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USERNAME}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl_certificate_verification => false
  }

  # Console output for debugging (remove in production)
  stdout {
    codec => rubydebug
  }

  # Optional: Send alerts to Redis for real-time dashboards
  if "high_priority" in [tags] or "honeypot" in [tags] {
    redis {
      host => "redis"
      port => 6379
      password => "honeypod-redis-password-2024"
      key => "honeypod:alerts:%{@timestamp}"
      data_type => "list"
    }
  }
}

          mutate {
            add_field => { "alert.severity" => "critical" }
            add_field => { "alert.reason" => "lsass_access_detected" }
          }
        }
      }

      # Sysmon Event 12/13: Registry Modification
      if [sysmon_id] == "12" or [sysmon_id] == "13" {
        mutate {
          add_field => { "event.category" => "registry" }
        }

        # Flag persistence registry keys
        if [message] =~ /HKLM.*\\Run/ or [message] =~ /HKCU.*\\Run/ {
          mutate {
            add_field => { "alert.severity" => "medium" }
            add_field => { "alert.reason" => "registry_persistence_detected" }
          }
        }
      }
    }

    # Windows Security Event Log (Event ID series)
    if [message] =~ /EventID/ {
      grok {
        match => {
          "message" => "EventID: %{INT:win_event_id}"
        }
      }

      # Event 4624: Logon Success
      if [win_event_id] == "4624" {
        mutate {
          add_field => { "event.category" => "authentication" }
          add_field => { "event.action" => "logon_success" }
        }

        # Check for RDP logon (Type 10)
        if [message] =~ /LogonType.*10/ {
          mutate {
            add_field => { "alert.type" => "rdp_logon" }
          }

          # Flag for possible lateral movement
          if [message] =~ /192\.168\.30\./ {
            mutate {
              add_field => { "alert.severity" => "medium" }
              add_field => { "alert.reason" => "rdp_lateral_movement_possible" }
            }
          }
        }
      }

      # Event 4625: Logon Failure (Brute Force Detection)
      if [win_event_id] == "4625" {
        mutate {
          add_field => { "event.category" => "authentication" }
          add_field => { "event.action" => "logon_failure" }
        }
      }

      # Event 4707: Forwarding Rule Created (Email T1566)
      if [win_event_id] == "4707" {
        mutate {
          add_field => { "alert.severity" => "medium" }
          add_field => { "alert.reason" => "email_forwarding_rule" }
          add_field => { "mitre_technique" => "T1566" }
        }
      }

      # Event 4697: Service Created (T1543)
      if [win_event_id] == "4697" {
        mutate {
          add_field => { "event.category" => "service" }
          add_field => { "event.action" => "service_created" }
        }

        # Flag suspicious service paths
        if [message] =~ /Temp|AppData|ProgramData/ {
          mutate {
            add_field => { "alert.severity" => "high" }
            add_field => { "alert.reason" => "suspicious_service_path" }
            add_field => { "mitre_technique" => "T1543" }
          }
        }
      }

      # Event 5136: AD Object Modification (T1484)
      if [win_event_id] == "5136" {
        mutate {
          add_field => { "event.category" => "directory_service" }
          add_field => { "alert.reason" => "ad_object_modification" }
          add_field => { "mitre_technique" => "T1484" }
        }

        # Check if non-admin made change
        if [message] !~ /NT AUTHORITY|DOMAIN ADMINS/ {
          mutate {
            add_field => { "alert.severity" => "critical" }
          }
        }
      }
    }
  }

  # ========================================================================
  # Linux Auditd Processing
  # ========================================================================

  if [message] =~ /type=EXECVE|type=SYSCALL/ {
    mutate {
      add_field => { "event.type" => "auditd" }
      add_field => { "[@metadata][index_prefix]" => "siem-linux" }
    }

    # Process execution
    grok {
      match => {
        "message" => "comm=\"%{DATA:process_name}\" exe=\"%{GREEDYDATA:process_path}\""
      }
    }

    mutate {
      add_field => { "event.category" => "process" }
    }

    # Flag suspicious processes on Linux
    if [process_name] =~ /tcpdump|tcpflow|wireshark|tshark|dumpcap/ {
      mutate {
        add_field => { "alert.severity" => "high" }
        add_field => { "alert.reason" => "packet_capture_tool_detected" }
        add_field => { "mitre_technique" => "T1040" }
      }
    }
  }

  # ========================================================================
  # DNS Query Processing
  # ========================================================================

  if [type] == "dns" {
    if [message] =~ /query/ {
      grok {
        match => {
          "message" => "query: %{DATA:dns_query} %{DATA:dns_qtype}"
        }
      }

      mutate {
        add_field => { "[@metadata][index_prefix]" => "siem-dns" }
      }

      # Detect DNS tunneling (large TXT queries, high QPS)
      if [dns_qtype] == "TXT" and [dns_query] =~ /.{80,}/ {
        mutate {
          add_field => { "alert.severity" => "medium" }
          add_field => { "alert.reason" => "dns_tunneling_suspected" }
          add_field => { "mitre_technique" => "T1041" }
        }
      }
    }
  }

  # ========================================================================
  # Honeypot/Deception Events (OpenCanary)
  # ========================================================================

  if [source] == "opencanary" {
    json {
      source => "message"
    }

    mutate {
      add_field => { "[@metadata][index_prefix]" => "siem-deception" }
      add_field => { "event.category" => "honeypot" }
      add_field => { "alert.severity" => "high" }
      add_field => { "alert.reason" => "honeypot_engagement_detected" }
      add_field => { "engagement_tactic" => "MITRE-Engage-Monitor-Deceive" }
    }
  }

  # ========================================================================
  # Common Enrichment
  # ========================================================================

  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # GeoIP enrichment for external IPs
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
    }
  }

  # Threat intelligence lookup (if available)
  if [destination_ip] {
    mutate {
      add_field => { "threat_intel" => "lookup_pending" }
    }
  }
}

output {
  # Main output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "honeypod-elastic-password-2024"
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    ssl => true
    ssl_certificate_verification => false
  }

  # Debug output to file (optional)
  if [@metadata][debug] {
    file {
      path => "/var/log/logstash/debug-%{+YYYY-MM-dd}.log"
    }
  }

  # Alert output (high severity events)
  if [alert][severity] == "critical" or [alert][severity] == "high" {
    stdout {
      codec => rubydebug
    }
  }
}
