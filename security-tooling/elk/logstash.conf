# ============================================================================
# Logstash Main Configuration
# Receives syslog from all lab systems and forwards to Elasticsearch
# Sysmon/Windows/Linux/DNS processing is handled by logstash-sysmon.conf
# ============================================================================

input {
  # Receive syslog from all lab systems (UDP - fire and forget)
  udp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive syslog over TCP (more reliable)
  tcp {
    port => 514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Receive Windows events (Winlogbeat / Filebeat)
  beats {
    port => 5000
    type => "beats"
  }
}

filter {
  # Parse syslog format
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:process}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}" }
      add_field => { "received_at" => "%{@timestamp}" }
      add_field => { "received_from" => "%{host}" }
    }

    # Parse SSH events
    if [process] =~ /sshd/ {
      grok {
        match => { "log_message" => "(?:Invalid user|Failed password|Accepted) %{DATA:auth_result}" }
        tag_on_failure => []
      }
      mutate {
        add_tag => ["ssh"]
        add_field => { "event_type" => "authentication" }
      }
    }

    # Parse sudo events
    if [process] =~ /sudo/ or [log_message] =~ /sudo/ {
      grok {
        match => { "log_message" => "sudo: %{DATA:user} : TTY=%{DATA:tty} ; PWD=%{DATA:pwd} ; USER=%{DATA:target_user} ; COMMAND=%{DATA:command}" }
        tag_on_failure => []
      }
      mutate {
        add_tag => ["privilege_escalation"]
        add_field => { "event_type" => "privilege_escalation" }
      }
    }

    # Tag failed login attempts
    if [log_message] =~ /Failed password/ or [log_message] =~ /Invalid user/ {
      mutate {
        add_tag => ["failed_login"]
        add_field => { "event_status" => "failed" }
      }
    }

    # Tag successful logins
    if [log_message] =~ /Accepted/ {
      mutate {
        add_tag => ["successful_login"]
        add_field => { "event_status" => "success" }
      }
    }

    # GeoIP enrichment
    if [host] {
      geoip {
        source => "host"
        target => "geoip"
      }
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
      target => "@timestamp"
      timezone => "UTC"
    }

    # Clean up raw fields after parsing
    mutate {
      remove_field => [ "host" ]
    }
  }

  # Parse Beats events (Windows Winlogbeat / Filebeat)
  if [type] == "beats" or [type] == "winlogbeat" {
    mutate {
      add_field => { "log_source" => "windows" }
      add_field => { "collected_at" => "%{@timestamp}" }
    }
  }

  # Honeypot alerts (OpenCanary / Cowrie via syslog)
  if [process] =~ /canary|cowrie/ or [syslog_hostname] =~ /canary|cowrie/ {
    mutate {
      add_tag => ["honeypot"]
      add_tag => ["high_priority"]
      add_field => { "severity" => "critical" }
      add_field => { "event_type" => "deception_engagement" }
    }
  }

  # OpenCanary JSON events (forwarded as JSON payload)
  if [source] == "opencanary" {
    json {
      source => "message"
    }
    mutate {
      add_field => { "[@metadata][index_prefix]" => "siem-deception" }
      add_field => { "event.category" => "honeypot" }
      add_field => { "alert.severity" => "high" }
      add_field => { "alert.reason" => "honeypot_engagement_detected" }
    }
  }

  # Add lab metadata to every event
  mutate {
    add_field => { "lab_name" => "HoneyPod" }
    add_field => { "lab_version" => "1.0" }
    add_field => { "environment" => "cyber_range" }
  }
}

output {
  # Send to Elasticsearch (no auth — xpack.security disabled for 7.x lab)
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    index => "siem-%{+YYYY.MM.dd}"
  }

  # Send high-priority alerts to Redis for real-time dashboards
  if "high_priority" in [tags] or "honeypot" in [tags] {
    redis {
      host => "redis"
      port => 6379
      password => "${REDIS_PASSWORD}"
      key => "honeypod:alerts"
      data_type => "list"
    }
  }
}
