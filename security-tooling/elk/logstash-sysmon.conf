# ============================================================================
# Logstash Sysmon / Windows / Linux Auditd Pipeline
# Processes structured events from Winlogbeat (Sysmon) and Auditbeat (Linux)
# ============================================================================

input {
  beats {
    port => 5044
    type => "beats-sysmon"
  }
}

filter {
  # ========================================================================
  # Windows Sysmon Processing (via Winlogbeat)
  # ========================================================================
  if [type] == "beats-sysmon" or [event][module] == "sysmon" {
    mutate {
      add_field => { "log_source" => "windows_sysmon" }
      add_field => { "[@metadata][index_prefix]" => "siem-windows" }
    }

    if [winlog][event_id] {
      mutate {
        copy => { "[winlog][event_id]" => "sysmon_id" }
        convert => { "sysmon_id" => "string" }
      }
    }

    # Event 1: Process Creation
    if [sysmon_id] == "1" {
      mutate { add_field => { "event.category" => "process" "event.action" => "process_creation" } }

      if [winlog][event_data][Image] =~ /mimikatz|procdump|wce\.exe|pwdump/ {
        mutate {
          add_field => { "alert.severity" => "critical" "alert.reason" => "credential_dumping_tool_detected" "mitre_technique" => "T1003" }
        }
      }

      if [winlog][event_data][Image] =~ /psexec|wmiexec|smbexec/ {
        mutate {
          add_field => { "alert.severity" => "high" "alert.reason" => "lateral_movement_tool_detected" "mitre_technique" => "T1021" }
        }
      }
    }

    # Event 3: Network Connection
    if [sysmon_id] == "3" {
      mutate { add_field => { "event.category" => "network" "event.action" => "network_connection" } }

      if [winlog][event_data][DestinationPort] == "3389" {
        mutate {
          add_field => { "alert.severity" => "medium" "alert.reason" => "rdp_connection_detected" "mitre_technique" => "T1021.001" }
        }
      }
    }

    # Event 10: LSASS Access
    if [sysmon_id] == "10" {
      if [winlog][event_data][TargetImage] =~ /lsass\.exe/ {
        mutate {
          add_field => { "event.category" => "credential_access" "alert.severity" => "critical" "alert.reason" => "lsass_access_detected" "mitre_technique" => "T1003.001" }
        }
      }
    }

    # Event 12/13: Registry Modification
    if [sysmon_id] == "12" or [sysmon_id] == "13" {
      mutate { add_field => { "event.category" => "registry" } }

      if [winlog][event_data][TargetObject] =~ /HKLM.*\\Run|HKCU.*\\Run/ {
        mutate {
          add_field => { "alert.severity" => "medium" "alert.reason" => "registry_persistence_detected" "mitre_technique" => "T1547.001" }
        }
      }
    }
  }

  # ========================================================================
  # Windows Security Event Log (via Winlogbeat)
  # ========================================================================
  if [winlog][event_id] {
    if [winlog][event_id] == 4624 {
      mutate { add_field => { "event.category" => "authentication" "event.action" => "logon_success" "[@metadata][index_prefix]" => "siem-windows" } }

      if [winlog][event_data][LogonType] == "10" and [winlog][event_data][IpAddress] =~ /^192\.168\./ {
        mutate {
          add_field => { "alert.severity" => "medium" "alert.reason" => "rdp_lateral_movement_possible" "mitre_technique" => "T1021.001" }
        }
      }
    }

    if [winlog][event_id] == 4625 {
      mutate { add_field => { "event.category" => "authentication" "event.action" => "logon_failure" "[@metadata][index_prefix]" => "siem-windows" } }
    }

    if [winlog][event_id] == 4697 {
      mutate { add_field => { "event.category" => "service" "event.action" => "service_created" } }

      if [winlog][event_data][ServiceFileName] =~ /Temp|AppData|ProgramData/ {
        mutate {
          add_field => { "alert.severity" => "high" "alert.reason" => "suspicious_service_path" "mitre_technique" => "T1543" }
        }
      }
    }

    if [winlog][event_id] == 5136 {
      mutate { add_field => { "event.category" => "directory_service" "alert.reason" => "ad_object_modification" "mitre_technique" => "T1484" } }

      if [winlog][event_data][SubjectUserName] !~ /SYSTEM|Administrator/ {
        mutate { add_field => { "alert.severity" => "critical" } }
      }
    }
  }

  # ========================================================================
  # Linux Auditd Processing (via Auditbeat)
  # ========================================================================
  if [event][module] == "auditd" {
    mutate { add_field => { "event.type" => "auditd" "[@metadata][index_prefix]" => "siem-linux" } }

    if [process][name] =~ /tcpdump|tcpflow|wireshark|tshark|dumpcap/ {
      mutate {
        add_field => { "alert.severity" => "high" "alert.reason" => "packet_capture_tool_detected" "mitre_technique" => "T1040" }
      }
    }
  }

  # ========================================================================
  # DNS Query Processing
  # ========================================================================
  if [type] == "dns" {
    mutate { add_field => { "[@metadata][index_prefix]" => "siem-dns" } }

    if [dns][question][type] == "TXT" and [dns][question][name] =~ /.{80,}/ {
      mutate {
        add_field => { "alert.severity" => "medium" "alert.reason" => "dns_tunneling_suspected" "mitre_technique" => "T1071.004" }
      }
    }
  }

  # GeoIP enrichment
  if [source_ip] {
    geoip { source => "source_ip" target => "geoip" }
  }

  mutate {
    add_field => { "lab_name" => "HoneyPod" "environment" => "cyber_range" }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
    index => "%{[@metadata][index_prefix]:siem-misc}-%{+YYYY.MM.dd}"
  }
}
