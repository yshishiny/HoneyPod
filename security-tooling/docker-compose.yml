version: '3.8'

# Load credentials from .env (copy .env.example → .env and set values)
# See: .env.example

services:
  # Elasticsearch - Log storage and search (7.17.23, no auth by default)
  elasticsearch:
    build:
      context: ./elasticsearch
    container_name: honeypod-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - honeypod-security
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Logstash - Log ingestion and processing
  logstash:
    build:
      context: ./logstash
    container_name: honeypod-logstash
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./elk/logstash-sysmon.conf:/usr/share/logstash/pipeline/logstash-sysmon.conf:ro
      - ./elk/patterns/sysmon.grok:/usr/share/logstash/patterns/sysmon.grok:ro
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - REDIS_PASSWORD=${REDIS_PASSWORD:-honeypod-redis-password-2024}
    ports:
      - "5000:5000"
      - "6514:6514/udp"
      - "514:514/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - honeypod-security
    restart: unless-stopped

  # Kibana - Visualization and dashboards
  kibana:
    build:
      context: ./kibana
    container_name: honeypod-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - KIBANA_DEFAULTAPPID=discover
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - honeypod-security
    restart: unless-stopped

  # Redis - Caching for SIEM correlations
  redis:
    build:
      context: ./redis
    container_name: honeypod-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-honeypod-redis-password-2024}
    networks:
      - honeypod-security
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-honeypod-redis-password-2024}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  elasticsearch-data:
    driver: local
    name: honeypod-elasticsearch-data
  redis-data:
    driver: local
    name: honeypod-redis-data

networks:
  honeypod-security:
    name: honeypod-security
    driver: bridge
