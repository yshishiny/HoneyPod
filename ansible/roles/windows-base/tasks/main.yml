---
# ============================================================================
# Windows Base Configuration
# ============================================================================

- name: Install Windows updates
  win_updates:
    category_names:
      - SecurityUpdates
      - CriticalUpdates
      - Updates
    state: installed
  register: update_result
  ignore_errors: yes

- name: Reboot if updates installed
  win_reboot:
    msg: "Rebooting after Windows updates"
    reboot_timeout: 600
  when: update_result.changed

- name: Enable firewall
  win_firewall:
    state: enabled
    profiles:
      - Domain
      - Private
      - Public

- name: Allow WinRM for Ansible
  win_firewall_rule:
    name: "Windows Remote Management - HTTPS"
    direction: in
    action: allow
    enabled: yes
    profiles: 'Domain'
    protocol: 'tcp'
    localport: '5985-5986'
    state: present

- name: Enable PowerShell logging
  win_regedit:
    path: 'HKLM:\Software\Policies\Microsoft\Windows\PowerShell'
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    datatype: dword
  loop:
    - { name: "EnableModuleLogging", data: 1 }
    - { name: "EnableScriptBlockLogging", data: 1 }

- name: Create local admin user
  win_user:
    name: "{{ local_admin_user }}"
    password: "{{ local_admin_password }}"
    groups:
      - Administrators
    state: present
  ignore_errors: yes

- name: Install required Windows features
  win_feature:
    name:
      - NET-Framework-45-Core
      - NET-Framework-45-Features
      - RPC-over-HTTP-Proxy
    state: present

- name: Configure Windows Defender exclusions
  win_shell: |
    Add-MpPreference -ExclusionPath "C:\HoneyPod*", "C:\Temp*", "C:\Tools*" -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: Set time zone
  win_timezone:
    timezone: "{{ lab_timezone | default('UTC') }}"

- name: Set static IP if provided
  win_shell: |
    $adapter = Get-NetAdapter | Where-Object {$_.Status -eq "Up"} | Select-Object -First 1
    New-NetIPAddress -InterfaceAlias $adapter.Name -IPAddress "{{ ansible_host }}" -PrefixLength 24 -DefaultGateway "192.168.10.1" -ErrorAction SilentlyContinue
  when: ansible_host is defined
  ignore_errors: yes

- name: Enable remoting
  win_shell: |
    Enable-PSRemoting -Force -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: Register Windows base config fact
  set_fact:
    windows_base_configured: true
    cacheable: yes
