---
# ============================================================================
# Handlers for Canary Deployment services
# ============================================================================

- name: restart opencanary
  systemd:
    name: opencanary
    state: restarted
    daemon_reload: yes

- name: restart cowrie
  systemd:
    name: cowrie
    state: restarted
    daemon_reload: yes

- name: reload systemd
  systemd:
    daemon_reload: yes
